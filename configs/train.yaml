# Run: python main.py fit --config configs/train.yaml

seed_everything: 42
trainer:
  max_epochs: 50
  accelerator: "gpu"
  devices: "-1"
  strategy: "auto"
  precision: "bf16-mixed"
  gradient_clip_val: 1.0
  callbacks:
    - class_path: lightning.pytorch.callbacks.ModelCheckpoint
      init_args:
        save_weights_only: false
        mode: "min"
        monitor: "val_loss"
        every_n_train_steps: 0
        every_n_epochs: 1
        train_time_interval: null
    - class_path: lightning.pytorch.callbacks.EarlyStopping
      init_args:
        monitor: "val_loss"
        min_delta: 0.0
        patience: 10
        verbose: false
  logger:
    - class_path: lightning.pytorch.loggers.TensorBoardLogger
      init_args:
        save_dir: "."
        name: "logs"

model:
  class_path: models.lightning_module.GPTLightning
  init_args:
    in_channels: 3
    kernel_size: 16
    num_tokens: 320
    d_model: 512
    num_heads: 8
    num_enc_layers: 8
    dropout: 0.1
    max_len: 5000
    dim_feedforward_multiplier: 4
    token_cnn_kernel: 5
    token_cnn_layers: 3
    token_cnn_dilation_growth: 2
    token_cnn_dropout: 0.0
    time_loss: "log_cosh"
    temporal_delta_weight: 0.05
    stft_enable: true
    stft_weight: 0.05
    stft_n_ffts: [128, 256, 512]
    lambda_coherence: 0.1
    lr: 1.0e-4
    scheduler: CosineAnnealingWarmRestarts
    # With lr_warmup_steps > 0, cosine uses optimizer steps; T_0 = restart period in steps (10 is very short—raise if LR oscillates too fast).
    scheduler_T_0: 10
    scheduler_T_mult: 2
    scheduler_eta_min: 1.0e-5
    lr_warmup_steps: 1000
    lr_scheduler_interval: step
    lr_scheduler_frequency: 1
    lr_scheduler_monitor: null
    use_torch_compile: false
    compile_mode: "reduce-overhead"
    num_pred_horizons: 4
    mtp_weight_decay: 0.6

data:
  class_path: data.data_handling.SeismicDataModule
  init_args:
    data_dir: /mnt/d/waleed/Seismology/simulation/clean/SobolDataset
    kernel_size: 16
    stride: 16
    batch_size: 32
    num_workers: 16
    num_tokens: 320
    normalize: true
    random_shift: true
    num_pred_horizons: 4
    aug_polarity_flip: true
    aug_channel_swap: true